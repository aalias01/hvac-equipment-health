# Render deployment manifest — HVAC Equipment Health Scoring API
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hvac-health-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
